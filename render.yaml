services:
  # ── Backend API (FastAPI) ─────────────────────────────────────────────────
  - type: web
    name: pdf-toolkit-api
    runtime: python
    rootDir: .
    buildCommand: bash render-build.sh
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        fromDatabase:
          name: pdf-toolkit-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: pdf-toolkit-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: STORAGE_TYPE
        value: local
      - key: UPLOAD_DIR
        value: /tmp/pdf-toolkit/uploads
      - key: ALLOWED_HOSTS
        value: '["https://pdf-toolkit-ui.onrender.com","http://localhost:3000"]'
      - key: CLAMAV_HOST
        value: ""
      - key: DEBUG
        value: "false"

  # ── Frontend (Next.js as static) ──────────────────────────────────────────
  - type: web
    name: pdf-toolkit-ui
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: node .next/standalone/server.js
    plan: free
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NEXT_PUBLIC_API_URL
        value: https://pdf-toolkit-api.onrender.com/api/v1
      - key: PORT
        value: "3000"
      - key: HOSTNAME
        value: "0.0.0.0"

  # ── Redis ─────────────────────────────────────────────────────────────────
  - type: redis
    name: pdf-toolkit-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList:
      - source: 0.0.0.0/0
        description: allow all

databases:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  - name: pdf-toolkit-db
    plan: free
    databaseName: pdfkit
    user: pdfkit
